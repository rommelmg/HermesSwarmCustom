model:
  default: gemini-3-flash-preview
  provider: gemini
agent:
  max_turns: 90
  tool_use_enforcement: auto
  # CRÍTICO: Estas herramientas están deshabilitadas para el orquestador Tlatoani
  # para forzarlo a usar delegate_task siempre.
  disabled_toolsets: ["terminal", "file", "web", "browser", "code_execution", "image_gen", "video", "spotify", "homeassistant", "cronjob"]
display:
  language: es
  skin: default
  show_reasoning: false
security:
  redact_secrets: true
delegation:
  enabled: true
  orchestrator_enabled: true
  max_spawn_depth: 1
memory:
  memory_enabled: true
  user_profile_enabled: true
# agents_config_path: ./agents-config.json
